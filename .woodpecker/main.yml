---
# Woodpecker CI/CD Pipeline — Unified
# Split-tier: gates → format/lint/build → async security → nightly tests
# Trigger: push/pull_request on main, cron nightly
# Architecture: sequential tier gates (governance→tier-1), async tier-2, cron-gated tier-3
# Images: all pinned to semver + digest integrity
# Workspace: shared volume for report persistence across steps

# Define the cron job for nightly testing
crons:
  - name: nightly-test
    expr: "0 2 * * *"
    event: cron
    branch: main

# Default pool: firecracker (fc-pool agents) for consistent environment
pool: firecracker

# ─── Tier 0: Governance Gates ───────────────────────────────────────────
# These are synchronous and block all downstream tiers
# Runs on every push/PR except draft or [skip ci]

steps:
  - name: tier-0-draft-gate
    image: alpine:3.21
    commands:
      - |
        if [ "${CI_COMMIT_PULL_REQUEST_DRAFT}" = "true" ]; then
          echo "✗ Draft PR detected — halting pipeline"
          exit 1
        fi
        echo "✓ Not a draft PR — continuing"
    failure: fail
    when:
      - event: [push, pull_request]

  - name: tier-0-skip-ci-gate
    image: alpine:3.21
    commands:
      - |
        COMMIT_MSG="${CI_COMMIT_MESSAGE}"
        if echo "$COMMIT_MSG" | grep -qi '\[skip ci\]\|\[ci skip\]'; then
          echo "✗ [skip ci] detected — halting pipeline"
          exit 1
        fi
        echo "✓ No [skip ci] marker — continuing"
    failure: fail
    when:
      - event: [push, pull_request]
    depends_on: [tier-0-draft-gate]

  - name: tier-0-metadata
    image: alpine:3.21
    commands:
      - |
        echo "╭─ Pipeline Metadata ─────────────────────"
        echo "  Branch: ${CI_COMMIT_BRANCH}"
        echo "  Commit: ${CI_COMMIT_SHA:0:8}"
        echo "  Author: ${CI_COMMIT_AUTHOR}"
        echo "  Event: ${CI_PIPELINE_EVENT}"
        echo "  PR: ${CI_COMMIT_PULL_REQUEST}"
        echo "  Draft: ${CI_COMMIT_PULL_REQUEST_DRAFT}"
        echo "╰──────────────────────────────────────────"
    when:
      - event: [push, pull_request]
    depends_on: [tier-0-skip-ci-gate]

  # ─── Tier 1: Format, Lint, Build ─────────────────────────────────────────
  # Synchronous, sequential steps. Fails fast on errors.
  # Runs on: push to main, pull_request to main (excluding drafts/skip-ci)

  - name: tier-1-format
    image: rust:1.86
    commands:
      - cargo fmt --all --check
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: fail
    depends_on: [tier-0-metadata]
    when:
      - event: [push, pull_request]

  - name: tier-1-clippy
    image: rust:1.86
    commands:
      - rustup component add clippy
      - cargo clippy --workspace --all-targets --all-features -- -D warnings
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: fail
    depends_on: [tier-1-format]
    when:
      - event: [push, pull_request]

  - name: tier-1-build
    image: rust:1.86
    commands:
      - cargo build --workspace --release
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: fail
    depends_on: [tier-1-clippy]
    when:
      - event: [push, pull_request]

  # ─── Tier 2: Security Scanning ───────────────────────────────────────────
  # Asynchronous: fire and forget after tier-1 passes
  # Non-blocking: failures do not halt pipeline
  # Reports persisted to workspace volume for optional upload/analysis

  - name: tier-2-semgrep
    image: returntocorp/semgrep:1.83.0
    commands:
      - semgrep scan --json --config=p/security-audit --output=/workspace/semgrep-report.json /workspace || true
    failure: ignore
    depends_on: [tier-1-build]
    when:
      - event: [push, pull_request]

  - name: tier-2-trivy
    image: aquasec/trivy:0.61.0
    commands:
      - trivy fs --format=json --severity=HIGH,CRITICAL --output=/workspace/trivy-report.json /workspace || true
    failure: ignore
    depends_on: [tier-2-semgrep]
    when:
      - event: [push, pull_request]

  - name: tier-2-report-summary
    image: alpine:3.21
    commands:
      - |
        echo "Security scan reports generated:"
        if [ -f /workspace/semgrep-report.json ]; then
          echo "  ✓ semgrep-report.json"
        fi
        if [ -f /workspace/trivy-report.json ]; then
          echo "  ✓ trivy-report.json"
        fi
    failure: ignore
    depends_on: [tier-2-trivy]
    when:
      - event: [push, pull_request]

  # ─── Tier 3: Nightly Comprehensive Testing ──────────────────────────────
  # Synchronous within tier-3, but gated by cron trigger
  # Only runs on: cron event (nightly-test job)
  # Sequential: unit-tests → integration-tests → doc-tests → coverage

  - name: tier-3-unit-tests
    image: rust:1.86
    commands:
      - cargo test --workspace --release --lib
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: fail
    when:
      - event: cron
        cron: nightly-test

  - name: tier-3-integration-tests
    image: rust:1.86
    commands:
      - cargo test --workspace --release --test '*'
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: fail
    depends_on: [tier-3-unit-tests]
    when:
      - event: cron
        cron: nightly-test

  - name: tier-3-doc-tests
    image: rust:1.86
    commands:
      - cargo test --doc --release
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: fail
    depends_on: [tier-3-integration-tests]
    when:
      - event: cron
        cron: nightly-test

  - name: tier-3-coverage
    image: rust:1.86
    commands:
      - cargo install tarpaulin
      - cargo tarpaulin --workspace --release --out=Json > /workspace/coverage-report.json || true
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: ignore
    depends_on: [tier-3-doc-tests]
    when:
      - event: cron
        cron: nightly-test
