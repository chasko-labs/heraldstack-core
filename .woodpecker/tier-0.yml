---
# Tier 0 — Governance Gates
# Skip draft PRs and [skip ci] commits, capture pipeline metadata
# Execution time: <5 sec
# Blocks downstream: yes

steps:
  - name: gate-draft-pr
    image: alpine:latest
    commands:
      # Exit clean if draft PR detected
      # woodpecker exposes WOODPECKER_PULL_REQUEST_DRAFT
      - |
        if [ "${WOODPECKER_PULL_REQUEST_DRAFT}" = "true" ]; then
          echo "Skipping draft PR — tier-1+ gates will not run"
          exit 0
        fi
        echo "PR is not draft — continuing to tier-1"

  - name: gate-skip-ci
    image: alpine:latest
    commands:
      # [skip ci] or [ci skip] in commit message exits clean
      - |
        COMMIT_MSG="${WOODPECKER_COMMIT_MESSAGE}"
        if echo "$COMMIT_MSG" | grep -qi '\[skip ci\]\|\[ci skip\]'; then
          echo "Detected [skip ci] in commit message — pipeline will halt"
          exit 0
        fi
        echo "No [skip ci] marker — continuing to tier-1"

  - name: capture-metadata
    image: alpine:latest
    commands:
      - |
        echo "Pipeline metadata:"
        echo "  Branch: ${WOODPECKER_BRANCH}"
        echo "  Commit: ${WOODPECKER_COMMIT_SHA:0:8}"
        echo "  Author: ${WOODPECKER_COMMIT_AUTHOR}"
        echo "  Event: ${WOODPECKER_EVENT}"
        echo "  Pull Request: ${WOODPECKER_PULL_REQUEST}"
        echo "  Pull Request Draft: ${WOODPECKER_PULL_REQUEST_DRAFT}"
