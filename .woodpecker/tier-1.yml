# tier-1.yml — firecracker-native ci via woodpecker-fc-plugin
# all steps execute inside firecracker microvms, not docker containers
# plugin image: heraldstack/woodpecker-fc-plugin:0.1.0
#   built locally on rocm agent host — no registry push, woodpecker pull policy: if-not-present
# rootfs: heraldstack-ci-rust (only rust rootfs allowlisted in fc-pool policy)
# cancel_key: static pilot1-tier1-<step> pattern — replace with dynamic workflow_id in v2
# tracking: heraldstack-firecracker woodpecker-fc-plugin integration (cancel_key TBD in plugin issue)

when:
  - event: [push, pull_request]

steps:
  - name: fmt
    image: heraldstack/woodpecker-fc-plugin:0.1.0
    environment:
      FC_POOL_BASE_URL: http://host.docker.internal:8150
      FC_POOL_CI_TOKEN:
        from_secret: fc_pool_ci_token
    settings:
      image: heraldstack-ci-rust
      cancel_key: pilot1-tier1-fmt
      tier: 1
      time_budget_secs: 900
      cache_mounts_ro:
        - /srv/ci-cache/cargo
      env:
        CARGO_HOME: /ci-cache/cargo
      commands:
        - cargo fmt --all --check

  - name: clippy
    image: heraldstack/woodpecker-fc-plugin:0.1.0
    depends_on: [fmt]
    environment:
      FC_POOL_BASE_URL: http://host.docker.internal:8150
      FC_POOL_CI_TOKEN:
        from_secret: fc_pool_ci_token
    settings:
      image: heraldstack-ci-rust
      cancel_key: pilot1-tier1-clippy
      tier: 1
      time_budget_secs: 900
      cache_mounts_ro:
        - /srv/ci-cache/cargo
      env:
        CARGO_HOME: /ci-cache/cargo
      commands:
        - rustup component add clippy
        - cargo clippy --workspace --all-targets --all-features -- -D warnings

  - name: build
    image: heraldstack/woodpecker-fc-plugin:0.1.0
    depends_on: [clippy]
    environment:
      FC_POOL_BASE_URL: http://host.docker.internal:8150
      FC_POOL_CI_TOKEN:
        from_secret: fc_pool_ci_token
    settings:
      image: heraldstack-ci-rust
      cancel_key: pilot1-tier1-build
      tier: 1
      time_budget_secs: 1800
      cache_mounts_ro:
        - /srv/ci-cache/cargo
      env:
        CARGO_HOME: /ci-cache/cargo
      commands:
        - cargo build --workspace --release

  - name: test
    image: heraldstack/woodpecker-fc-plugin:0.1.0
    depends_on: [build]
    environment:
      FC_POOL_BASE_URL: http://host.docker.internal:8150
      FC_POOL_CI_TOKEN:
        from_secret: fc_pool_ci_token
    settings:
      image: heraldstack-ci-rust
      cancel_key: pilot1-tier1-test
      tier: 1
      time_budget_secs: 900
      cache_mounts_ro:
        - /srv/ci-cache/cargo
      env:
        CARGO_HOME: /ci-cache/cargo
      commands:
        - cargo test --workspace --all-features
