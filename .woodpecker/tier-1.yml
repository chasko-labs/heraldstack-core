---
# tier-1.yml — pilot-1 fc-pool ci via woodpecker-fc-plugin
# single step: fmt + clippy + test inside a firecracker microvm
# image: heraldstack/woodpecker-fc-plugin:0.1.0 (rocm-local, pull: never)
# rootfs: heraldstack-ci-rust (allowlisted in fc-pool CI_ALLOWED_IMAGES)
# secrets: ci_cancel_key, fc_pool_ci_token — set via woodpecker repo secrets UI
# cargo audit deferred to tier-2

when:
  - event: [push, pull_request]

steps:
  - name: rust-check
    image: heraldstack/woodpecker-fc-plugin:0.1.0
    pull: false
    settings:
      image: heraldstack-ci-rust
      commands:
        - cargo fmt --check --all
        - cargo clippy --workspace --all-targets -- -D warnings
        - cargo test --workspace
      cancel_key:
        from_secret: ci_cancel_key
      time_budget_secs: 600
      tier: 1
      env:
        RUST_LOG: info
    environment:
      FC_POOL_BASE_URL: http://host.docker.internal:8150
      FC_POOL_CI_TOKEN:
        from_secret: fc_pool_ci_token
