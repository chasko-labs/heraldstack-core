---
# Tier 1 — Format, Lint, Build
# Synchronous: fail immediately on format/clippy/compile errors
# Execution time: 5-10 min
# Blocks downstream: yes
# Pool: firecracker (fc-pool)

pool: firecracker

steps:
  - name: format-check
    image: rust:latest
    commands:
      - cargo fmt --all --check
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: fail

  - name: clippy-check
    image: rust:latest
    commands:
      - rustup component add clippy
      - cargo clippy --workspace --all-targets --all-features \
        -- -D warnings
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: fail
    depends_on: [format-check]

  - name: build-release
    image: rust:latest
    commands:
      - cargo build --workspace --release
    environment:
      CARGO_HOME: /workspace/.cargo
    failure: fail
    depends_on: [clippy-check]
