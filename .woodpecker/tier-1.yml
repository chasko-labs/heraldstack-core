when:
  - event: [push, pull_request]

steps:
  - name: fmt
    image: rust:1-slim
    commands:
      - cargo fmt --check

  - name: clippy
    image: rust:1-slim
    commands:
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  - name: build
    image: rust:1-slim
    commands:
      - cargo build --workspace --release

  - name: test
    image: rust:1-slim
    commands:
      - cargo test --workspace --all-features
